  <path d="M50 5 L85 20 V45 C85 70 50 90 50 90 C50 90 15 70 15 45 V20 L50 5Z" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
  
  <!-- Inner Circle -->
  <circle cx="50" cy="45" r="22" fill="none" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="2,1"/>
  <circle cx="50" cy="45" r="18" fill="#1e293b"/>
  
  <!-- AP Text -->
  <text x="50" y="52" font-family="'Outfit', sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="800" style="letter-spacing: 1px;">AP</text>
  
  <!-- Police Text at Bottom -->
  <path id="curve" d="M 25,75 Q 50,85 75,75" fill="none" />
